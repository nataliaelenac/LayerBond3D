<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LayerBond3D | Accesorii Auto Printate 3D Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container header-flex">
            <div class="logo-area">
                <span class="logo-text">LAYERBOND<span class="blue-accent">3D</span></span>
            </div>
            <nav>
                <a href="#produse">Produse</a>
                <a href="#despre">Despre Noi</a>
            </nav>
            <div class="cart-trigger" onclick="toggleCart()">
                Coș (<span id="cart-count">0</span>)
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container hero-content">
            <h1>PRECISION. STRENGTH. PERFORMANCE.</h1>
            <p>Accesorii auto practice. Design perfect. Printate 3D la calitate premium.</p>
            <a href="#produse" class="btn-primary">Explorează Catalogul</a>
        </div>
    </section>

    <section id="produse" class="products-section">
        <div class="container">
            <h2 class="section-title">Produse Populare</h2>
            <div class="products-grid" id="products-container">
                </div>
        </div>
    </section>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Coșul tău</h3>
            <button class="close-cart" onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-items-container" id="cart-items-container">
            </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-value">0.00 RON</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">Finalizează Comanda</button>
        </div>
    </div>
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

    <footer>
        <div class="container">
            <p>&copy; 2026 LayerBond3D. Made for Car Enthusiasts.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
