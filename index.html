<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LayerBond3D | Magazin Online Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #0b0c10; color: #c5c6c7; overflow-x: hidden; padding-top: 90px; }
        .container { width: 90%; max-width: 1200px; margin: 0 auto; }
        
        /* Header cu Logo-ul tău */
        header { background: rgba(11, 12, 16, 0.95); border-bottom: 1px solid #1f2833; position: fixed; width: 100%; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        
        .logo-container { display: flex; align-items: center; }
        .logo-img { height: 50px; display: block; object-fit: contain; }
        
        .cart-btn { background: #1f2833; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; border: 1px solid #0056ff; transition: 0.3s; color: #fff; }
        .cart-btn:hover { background: #0056ff; box-shadow: 0 0 15px rgba(0,86,255,0.5); }

        /* Hero Section cu imaginea de branding */
        .hero-banner {
            height: 45vh;
            background: linear-gradient(rgba(11, 12, 16, 0.4), rgba(11, 12, 16, 1)), url('https://raw.githubusercontent.com/nataliaelenac/nataliaelenac.github.io/main/image_4.png') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 1px solid #22262e;
            margin-bottom: 20px;
        }
        
        /* Protecție în caz că nu ai urcat imagine_4.png încă pe GitHub */
        .hero-banner-fallback { background-color: #14171c; }

        /* Products Grid */
        .products-title { text-align: center; margin: 30px 0; font-size: 26px; color: #fff; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-bottom: 60px; }
        .card { background: #14171c; border: 1px solid #22262e; border-radius: 8px; padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #0056ff; }
        .prod-img { width: 100%; height: 200px; object-fit: cover; border-radius: 6px; margin-bottom: 15px; }
        .prod-title { font-size: 18px; color: #fff; margin-bottom: 8px; }
        .prod-price { font-size: 18px; color: #66fcf1; font-weight: 700; margin-bottom: 15px; }
        
        /* Colors */
        .colors { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid #444; }
        .color-dot.active { transform: scale(1.25); border-color: #0056ff; box-shadow: 0 0 8px #0056ff; }
        .buy-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid #0056ff; color: #fff; font-weight: 600; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .buy-btn:hover { background: #0056ff; }

        /* Sidebar Cart */
        .sidebar { position: fixed; top: 0; right: -400px; width: 400px; height: 100%; background: #11141a; box-shadow: -5px 0 15px rgba(0,0,0,0.6); z-index: 102; transition: 0.3s ease; padding: 25px; display: flex; flex-direction: column; }
        .sidebar.open { right: 0; }
        .side-head { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #22252c; padding-bottom: 15px; margin-bottom: 20px; color: #fff; }
        .close-btn { background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; }
        .items-list { flex-grow: 1; overflow-y: auto; }
        .cart-item { background: #1c1f26; padding: 12px; border-radius: 6px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: none; border: none; color: #ff4d4d; cursor: pointer; font-weight: 600; }
        .side-foot { border-top: 1px solid #22252c; padding-top: 20px; }
        .total-box { font-size: 18px; color: #fff; font-weight: 600; display: flex; justify-content: space-between; margin-bottom: 15px; }
        .checkout-btn { width: 100%; padding: 15px; background: #0056ff; color: #fff; border: none; border-radius: 4px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 101; display: none; }
        .overlay.open { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="container header-flex">
            <div class="logo-container">
                <!-- Folosește imagine_3.png (logo-ul pe fundal alb/transparent) pentru o integrare curată -->
                <img src="image_3.png" alt="LayerBond3D" class="logo-img" onerror="this.src='image_2.png'; this.onerror=function(){this.style.display='none'; document.getElementById('logo-text-fallback').style.display='block';}">
                <span id="logo-text-fallback" style="display:none; font-size:22px; font-weight:700; color:#fff; letter-spacing:2px;">LAYERBOND<span style="color:#0056ff;">3D</span></span>
            </div>
            <div class="cart-btn" onclick="toggleCart()">Coș (<span id="count">0</span>)</div>
        </div>
    </header>

    <section class="hero-banner"></section>

    <main class="container">
        <h2 class="products-title">Accesorii Auto Practice. Design Perfect.</h2>
        <div class="grid" id="products-container"></div>
    </main>

    <div class="sidebar" id="sidebar">
        <div class="side-head">
            <h3>Coșul tău LayerBond3D</h3>
            <button class="close-btn" onclick="toggleCart()">&times;</button>
        </div>
        <div class="items-list" id="cart-list"></div>
        <div class="side-foot">
            <div class="total-box"><span>Total:</span><span id="total-val">0.00 RON</span></div>
            <button class="checkout-btn" onclick="checkout()">Finalizează Comanda</button>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <script>
        const products = [
            { id: 1, title: "Suport Pahar Auto Reglabil", price: 79.99, image: "https://images.unsplash.com/photo-1563720223185-11003d516935?q=80&w=500&auto=format&fit=crop" },
            { id: 2, title: "Suport Telefon Grilă Ventilație", price: 39.99, image: "https://images.unsplash.com/photo-1586105251261-72a756497a11?q=80&w=500&auto=format&fit=crop" },
            { id: 3, title: "Organizator Consolă Centrală", price: 50.00, image: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=500&auto=format&fit=crop" },
            { id: 4, title: "Suport Chei Dedicat Interior", price: 25.00, image: "https://images.unsplash.com/photo-1617788138017-80ad40651399?q=80&w=500&auto=format&fit=crop" }
        ];

        let cart = [];

        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = products.map(p => `
                <div class="card" id="p-${p.id}">
                    <div>
                        <img src="${p.image}" class="prod-img">
                        <h3 class="prod-title">${p.title}</h3>
                        <div class="prod-price">${p.price.toFixed(2)} RON</div>
                    </div>
                    <div>
                        <div class="colors" data-color="Negru">
                            <span class="color-dot active" style="background:#1a1a1a" onclick="selColor(this,'Negru')"></span>
                            <span class="color-dot" style="background:#ffffff" onclick="selColor(this,'Alb')"></span>
                            <span class="color-dot" style="background:#0056ff" onclick="selColor(this,'Albastru')"></span>
                        </div>
                        <button class="buy-btn" onclick="add(${p.id})">Adaugă în coș</button>
                    </div>
                </div>
            `).join('');
        }

        function selColor(el, color) {
            const parent = el.parentElement;
            parent.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            parent.setAttribute('data-color', color);
        }

        function toggleCart() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        function add(id) {
            const p = products.find(prod => prod.id === id);
            const color = document.getElementById(`p-${id}`).querySelector('.colors').getAttribute('data-color');
            const exist = cart.find(i => i.id === id && i.color === color);
            if(exist) exist.qty++; else cart.push({ ...p, color, qty: 1 });
            updateUI();
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').classList.add('open');
        }

        function remove(idx) { cart.splice(idx, 1); updateUI(); }

        function updateUI() {
            document.getElementById('count').innerText = cart.reduce((a, b) => a + b.qty, 0);
            document.getElementById('cart-list').innerHTML = cart.map((item, idx) => `
                <div class="cart-item">
                    <div>
                        <h4 style="color:#fff;font-size:14px;">${item.title}</h4>
                        <small style="color:#aaa;">${item.color} | x${item.qty}</small>
                    </div>
                    <button class="del-btn" onclick="remove(${idx})">Șterge</button>
                </div>
            `).join('');
            document.getElementById('total-val').innerText = cart.reduce((a, b) => a + (b.price * b.qty), 0).toFixed(2) + " RON";
        }

        function checkout() {
            if(!cart.length) return alert("Coșul e gol!");
            alert("Comandă trimisă cu succes pentru printare 3D!");
            cart = []; updateUI(); toggleCart();
        }

        window.onload = renderProducts;
    </script>
</body>
</html>
